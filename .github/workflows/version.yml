---
name: Version

# Opens/updates the Changesets "Version Packages" PR. This workflow never
# builds, signs, or publishes release artifacts — that's release.yml,
# triggered separately after a version PR merges and a maintainer creates
# a protected version tag. Keeping these workflows apart means version PR
# review never sits in the same trust boundary as release secrets.

on:
  push:
    branches: [main]

concurrency:
  group: version-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

defaults:
  run:
    shell: bash -Eeuo pipefail {0}

jobs:
  version:
    name: Version Packages PR
    # Only ever runs on pushes to main in this repo. No pull_request,
    # pull_request_target, workflow_run, or workflow_call trigger exists
    # on this workflow, so there is no fork/PR path that can reach the
    # contents/pull-requests write permissions below.
    if: github.repository == 'marcusrbrown/mothership'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: ⤵ Checkout Branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile

      - name: 📌 Version-sync check (pre-PR sanity)
        run: bun run version:check

      - name: 🚀 Create/update Version Packages PR
        uses: changesets/action@3841a0683d3cfa6dae0f9bb335290003010fe3f0 # v1.9.0
        with:
          version: bun run version
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
