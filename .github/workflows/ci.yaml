# CI gates for mothership. The build session extends this with lint / typecheck /
# test / tauri-build jobs as the app takes shape; design-check is a permanent gate.
---
name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, ready_for_review, reopened, synchronize]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

defaults:
  run:
    shell: bash -Eeuo pipefail {0}

jobs:
  design-check:
    name: Design Check
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: ⤵ Checkout Branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.head_ref }}

      - name: 🎨 Detect UI anti-patterns
        run: |
          if [ ! -d src ]; then
            echo "No src/ yet — design gate armed, nothing to scan."
            exit 0
          fi
          findings=$(npx --yes impeccable@3.2.0 detect --json src)
          if [ "$findings" != "[]" ]; then
            echo "$findings"
            echo "Impeccable detected UI anti-patterns. Address them or, for an intentional brand choice, add a scoped ignore via 'impeccable ignores add-value' (committed in .impeccable/config.json)."
            exit 1
          fi
          echo "No UI anti-patterns detected."

  verify:
    name: ${{ matrix.check }}
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        check: [typecheck, lint, test]
    steps:
      - name: ⤵ Checkout Branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.head_ref }}

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: 📦 Install dependencies
        run: |
          if [ ! -f package.json ]; then
            echo "No package.json yet — verify gate armed, nothing to run."
            exit 0
          fi
          bun install --frozen-lockfile

      - name: ✅ ${{ matrix.check }}
        run: |
          if [ ! -f package.json ]; then
            exit 0
          fi
          bun run ${{ matrix.check }}

  release-smoke:
    name: Release Config Smoke
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: ⤵ Checkout Branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.head_ref }}

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: 📦 Install dependencies
        run: |
          if [ ! -f package.json ]; then
            echo "No package.json yet — release-smoke gate armed, nothing to run."
            exit 0
          fi
          bun install --frozen-lockfile

      - name: 📌 Version sync check
        run: |
          if [ ! -f scripts/sync-version.ts ]; then
            exit 0
          fi
          bun run version:check

      - name: 🔒 Release policy smoke check (no secrets, synthetic eligible context)
        run: |
          if [ ! -f scripts/release-policy.ts ]; then
            exit 0
          fi
          # Exercises the script executable path only, with a synthetic
          # eligible context (a real version tag push). This is NOT a
          # real-context release decision — actual gating happens in
          # release.yaml against the workflow's own trigger context.
          bun scripts/release-policy.ts \
            --event push \
            --ref refs/tags/v0.0.0-ci-smoke \
            --repo "${{ github.repository }}"

      - name: 🧩 Tauri release config smoke (no secrets, no signing)
        run: |
          if [ ! -f src-tauri/tauri.release.conf.json ]; then
            exit 0
          fi
          # Config-shape check only: no macOS runner, no compile, no
          # signing. Confirms the release config fragment stays valid JSON
          # and keeps the invariants the release workflow depends on
          # (externalBin sidecar entry, separate app/sidecar entitlements,
          # no runtime updater capability grant) so a config regression
          # fails here instead of surfacing mid-release.
          python3 - <<'PY'
          import json, sys

          with open("src-tauri/tauri.release.conf.json") as f:
              release_conf = json.load(f)

          pubkey = release_conf.get("plugins", {}).get("updater", {}).get("pubkey")
          assert pubkey and pubkey != "REPLACE_WITH_GENERATED_TAURI_UPDATER_PUBLIC_KEY", \
              "release config must not ship the placeholder updater public key"

          bundle = release_conf.get("bundle", {})
          assert "ide-server" in " ".join(bundle.get("externalBin", [])), \
              "release config must declare the ide-server externalBin sidecar"

          macos = bundle.get("macOS", {})
          assert macos.get("entitlements") == "Entitlements.plist", \
              "release config must reference the main-app entitlements file"
          assert macos.get("hardenedRuntime") is True, \
              "release config must enable Hardened Runtime for notarization"

          with open("src-tauri/tauri.conf.json") as f:
              base_conf = json.load(f)
          assert base_conf.get("app", {}).get("security", {}).get("csp") is not None, \
              "base config must not ship with a null CSP"

          print("Tauri release config smoke OK.")
          PY

          if [ -f src-tauri/sidecar-Entitlements.plist ] && [ -f src-tauri/Entitlements.plist ]; then
            if diff -q src-tauri/Entitlements.plist src-tauri/sidecar-Entitlements.plist > /dev/null; then
              echo "❌ Main app and sidecar entitlements files are identical — sidecar-only exceptions must not apply to the main webview." >&2
              exit 1
            fi
            if grep -q "disable-library-validation" src-tauri/Entitlements.plist; then
              echo "❌ Main app entitlements must not include disable-library-validation (sidecar-only exception)." >&2
              exit 1
            fi
            echo "Entitlements separation smoke OK."
          fi

  check-workflows:
    name: Check Workflows
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: ⤵ Checkout Branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.head_ref }}

      - name: 🛠 Lint Workflows
        uses: raven-actions/actionlint@3d39aea434753780c3b3d4a1a31c854b4dbf49d7 # v2.2.0
